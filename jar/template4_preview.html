<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模板四 · Premium TV 预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #05080E;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 32px;
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
  position: relative;
}

/* 氛围背景层 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 30% 30%, rgba(0,157,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 70% 70%, rgba(0,229,192,0.03) 0%, transparent 50%),
    radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
}

/* 主容器 - 毛玻璃悬浮 */
.frame {
  position: relative;
  background: rgba(16, 22, 36, 0.82);
  backdrop-filter: blur(40px) saturate(1.2);
  -webkit-backdrop-filter: blur(40px) saturate(1.2);
  border-radius: 28px;
  width: 440px;
  max-width: 100%;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  /* 顶光微边 */
  border-top: 1px solid rgba(255,255,255,0.08);
  border-left: 1px solid rgba(255,255,255,0.03);
  border-right: 1px solid rgba(255,255,255,0.03);
  border-bottom: none;
}

/* 搜索栏行 */
.row {
  display: flex; align-items: center;
  margin-bottom: 8px; width: 100%;
}
.gear {
  width: 36px; height: 56px; flex: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #7A8BA5; cursor: pointer;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
}
.gear:focus-visible, .gear:hover { color: #E6ECF3; }

.input {
  flex: 1; min-width: 0; height: 56px;
  margin: 0 8px;
  background: rgba(255,255,255,0.04);
  border: none;
  border-radius: 28px;
  padding: 0 24px;
  font-size: 15px; color: #E6ECF3;
  text-align: center; outline: none;
  font-family: inherit;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
}
.input::placeholder { color: #7A8BA5; }
.input:focus { background: rgba(255,255,255,0.06); }

.btn-search {
  flex: none; height: 56px; width: 88px;
  background: linear-gradient(135deg, #009DFF, #00E5C0);
  border: none; border-radius: 28px;
  color: #fff; font-size: 15px; font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 0 20px rgba(0,229,192,0.15);
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
}
.btn-search::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 28px;
  box-shadow: 0 0 16px rgba(0,229,192,0.2), 0 0 40px rgba(0,157,255,0.1);
  opacity: 0; transition: opacity 1.5s ease-in-out;
}
.btn-search:hover::after { opacity: 1; }

.btn-second {
  flex: none; height: 56px; width: 60px; margin-left: 8px;
  background: rgba(255,255,255,0.04);
  border: none; border-radius: 28px;
  color: #7A8BA5; font-size: 14px; font-weight: 400;
  cursor: pointer; white-space: nowrap;
  font-family: inherit;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
}
.btn-second:hover {
  background: linear-gradient(135deg, #009DFF, #00E5C0);
  color: #fff;
  transform: scale(1.03);
  box-shadow: 0 0 16px rgba(0,229,192,0.3), 0 0 40px rgba(0,157,255,0.15),
              inset 0 0 12px rgba(0,229,192,0.1);
}

/* 平台标签栏 */
.tabs {
  display: flex; gap: 2px;
  justify-content: center;
  margin: 10px 0 14px;
  padding: 0 8px;
}
.tab {
  padding: 8px 20px;
  background: transparent;
  border: none;
  color: #7A8BA5; font-size: 14px; font-weight: 400;
  font-family: inherit;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
}
.tab::after {
  content: '';
  position: absolute; bottom: 0; left: 50%;
  width: 0; height: 2px;
  background: linear-gradient(90deg, #009DFF, #00E5C0);
  border-radius: 1px;
  transform: translateX(-50%);
  transition: width 0.25s cubic-bezier(0.22, 1, 0.36, 1);
}
.tab.active { color: #E6ECF3; font-weight: 500; }
.tab.active::after { width: 24px; }
.tab:hover { color: #E6ECF3; }

/* 结果区域 */
.result {
  background: rgba(255,255,255,0.02);
  border-radius: 20px;
  padding: 10px;
}

.group {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 16px 28px; margin-bottom: 6px;
  background: rgba(255,255,255,0.04);
  border: none; border-radius: 20px;
  color: #E6ECF3; font-size: 14px; font-weight: 400;
  cursor: pointer; text-align: left;
  font-family: inherit;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
}
.group:hover {
  background: linear-gradient(135deg, #009DFF, #00E5C0);
  color: #fff;
  font-weight: 500;
  transform: scale(1.03);
  box-shadow: 0 0 16px rgba(0,229,192,0.3), 0 0 40px rgba(0,157,255,0.15),
              inset 0 0 12px rgba(0,229,192,0.1);
}
.badge {
  padding: 2px 12px; font-size: 12px; font-weight: 400;
  background: rgba(255,255,255,0.06);
  border-radius: 12px; color: #7A8BA5;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
}
.group:hover .badge { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }

.grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  padding: 8px 10px 12px;
}
.cell {
  min-width: 64px; min-height: 64px;
  background: rgba(255,255,255,0.04);
  border: none; border-radius: 20px;
  color: #7A8BA5; font-size: 14px; font-weight: 400;
  cursor: pointer; font-family: inherit;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
}
.cell:hover {
  background: linear-gradient(135deg, #009DFF, #00E5C0);
  color: #fff;
  font-weight: 500;
  transform: scale(1.03);
  box-shadow: 0 0 16px rgba(0,229,192,0.3), 0 0 40px rgba(0,157,255,0.15),
              inset 0 0 12px rgba(0,229,192,0.1);
}
.cell.active {
  background: linear-gradient(135deg, #009DFF, #00E5C0);
  color: #fff; font-weight: 500;
}
</style>
</head>
<body>

<div class="frame">
  <div class="row">
    <div class="gear">&#x2699;&#xFE0F;</div>
    <input class="input" placeholder="搜索番剧、弹幕..." value="转生成史莱姆">
    <button class="btn-search">搜索</button>
    <button class="btn-second">正序</button>
  </div>

  <div class="tabs">
    <button class="tab active">默认</button>
    <button class="tab">巴哈姆特</button>
    <button class="tab">CR</button>
  </div>

  <div class="result">
    <button class="group">
      <span>转生成史莱姆 (24集)</span>
      <span class="badge">展开</span>
    </button>
    <div class="grid">
      <button class="cell active">01</button>
      <button class="cell">02</button>
      <button class="cell">03</button>
      <button class="cell">04</button>
      <button class="cell">05</button>
      <button class="cell">06</button>
      <button class="cell">07</button>
      <button class="cell">08</button>
      <button class="cell">09</button>
      <button class="cell">10</button>
      <button class="cell">11</button>
      <button class="cell">12</button>
    </div>
    <button class="group"><span>无职转生 (12集)</span><span class="badge">收起</span></button>
    <button class="group"><span>咒术回战 (6集)</span><span class="badge">收起</span></button>
  </div>
</div>

</body>
</html>
